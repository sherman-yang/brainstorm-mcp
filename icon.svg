<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4F46E5"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
    <linearGradient id="bubble1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#E0E7FF" stop-opacity="0.95"/>
    </linearGradient>
    <linearGradient id="bubble2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#DDD6FE" stop-opacity="0.9"/>
    </linearGradient>
    <linearGradient id="bubble3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#C4B5FD" stop-opacity="0.85"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect width="512" height="512" rx="108" ry="108" fill="url(#bg)"/>

  <!-- Connection lines between bubbles -->
  <line x1="185" y1="220" x2="270" y2="310" stroke="#A5B4FC" stroke-width="5" stroke-opacity="0.5"/>
  <line x1="330" y1="200" x2="270" y2="310" stroke="#A5B4FC" stroke-width="5" stroke-opacity="0.5"/>
  <line x1="185" y1="220" x2="330" y2="200" stroke="#A5B4FC" stroke-width="5" stroke-opacity="0.5"/>

  <!-- Top-left bubble (Model 1) -->
  <ellipse cx="185" cy="195" rx="88" ry="72" fill="url(#bubble1)"/>
  <!-- Thought bubble tail -->
  <circle cx="140" cy="275" r="14" fill="url(#bubble1)"/>
  <circle cx="120" cy="305" r="9" fill="url(#bubble1)"/>
  <!-- Dots representing text/thinking -->
  <circle cx="155" cy="190" r="10" fill="#4F46E5" opacity="0.7"/>
  <circle cx="185" cy="190" r="10" fill="#4F46E5" opacity="0.7"/>
  <circle cx="215" cy="190" r="10" fill="#4F46E5" opacity="0.7"/>

  <!-- Top-right bubble (Model 2) -->
  <ellipse cx="340" cy="180" rx="85" ry="70" fill="url(#bubble2)"/>
  <!-- Thought bubble tail -->
  <circle cx="390" cy="258" r="14" fill="url(#bubble2)"/>
  <circle cx="408" cy="288" r="9" fill="url(#bubble2)"/>
  <!-- Dots -->
  <circle cx="310" cy="175" r="10" fill="#7C3AED" opacity="0.7"/>
  <circle cx="340" cy="175" r="10" fill="#7C3AED" opacity="0.7"/>
  <circle cx="370" cy="175" r="10" fill="#7C3AED" opacity="0.7"/>

  <!-- Bottom-center bubble (Model 3) -->
  <ellipse cx="260" cy="330" rx="92" ry="74" fill="url(#bubble3)"/>
  <!-- Thought bubble tail -->
  <circle cx="210" cy="405" r="14" fill="url(#bubble3)"/>
  <circle cx="192" cy="432" r="9" fill="url(#bubble3)"/>
  <!-- Dots -->
  <circle cx="230" cy="325" r="10" fill="#6D28D9" opacity="0.7"/>
  <circle cx="260" cy="325" r="10" fill="#6D28D9" opacity="0.7"/>
  <circle cx="290" cy="325" r="10" fill="#6D28D9" opacity="0.7"/>

  <!-- Central spark / convergence point -->
  <circle cx="258" cy="240" r="18" fill="#FBBF24" opacity="0.9"/>
  <circle cx="258" cy="240" r="10" fill="#F59E0B"/>
  <!-- Small radiating lines from spark -->
  <line x1="258" y1="218" x2="258" y2="210" stroke="#FBBF24" stroke-width="3.5" stroke-linecap="round" opacity="0.8"/>
  <line x1="258" y1="262" x2="258" y2="270" stroke="#FBBF24" stroke-width="3.5" stroke-linecap="round" opacity="0.8"/>
  <line x1="236" y1="240" x2="228" y2="240" stroke="#FBBF24" stroke-width="3.5" stroke-linecap="round" opacity="0.8"/>
  <line x1="280" y1="240" x2="288" y2="240" stroke="#FBBF24" stroke-width="3.5" stroke-linecap="round" opacity="0.8"/>
  <line x1="243" y1="225" x2="237" y2="219" stroke="#FBBF24" stroke-width="3" stroke-linecap="round" opacity="0.6"/>
  <line x1="273" y1="225" x2="279" y2="219" stroke="#FBBF24" stroke-width="3" stroke-linecap="round" opacity="0.6"/>
  <line x1="243" y1="255" x2="237" y2="261" stroke="#FBBF24" stroke-width="3" stroke-linecap="round" opacity="0.6"/>
  <line x1="273" y1="255" x2="279" y2="261" stroke="#FBBF24" stroke-width="3" stroke-linecap="round" opacity="0.6"/>
</svg>
