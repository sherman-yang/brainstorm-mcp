<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="brain1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e94560"/>
      <stop offset="100%" style="stop-color:#ff6b6b"/>
    </linearGradient>
    <linearGradient id="brain2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f3460"/>
      <stop offset="100%" style="stop-color:#4ea8de"/>
    </linearGradient>
    <linearGradient id="brain3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#533483"/>
      <stop offset="100%" style="stop-color:#a855f7"/>
    </linearGradient>
    <linearGradient id="spark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fbbf24"/>
      <stop offset="100%" style="stop-color:#f59e0b"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="90" fill="url(#bg)"/>

  <!-- Connection lines between brains -->
  <line x1="160" y1="180" x2="350" y2="180" stroke="#ffffff" stroke-width="2" opacity="0.15"/>
  <line x1="160" y1="180" x2="256" y2="360" stroke="#ffffff" stroke-width="2" opacity="0.15"/>
  <line x1="350" y1="180" x2="256" y2="360" stroke="#ffffff" stroke-width="2" opacity="0.15"/>

  <!-- Thought streams flowing to center -->
  <circle cx="210" cy="230" r="3" fill="#ffffff" opacity="0.3"/>
  <circle cx="230" cy="250" r="2.5" fill="#ffffff" opacity="0.25"/>
  <circle cx="248" cy="265" r="2" fill="#ffffff" opacity="0.2"/>

  <circle cx="305" cy="230" r="3" fill="#ffffff" opacity="0.3"/>
  <circle cx="285" cy="250" r="2.5" fill="#ffffff" opacity="0.25"/>
  <circle cx="268" cy="265" r="2" fill="#ffffff" opacity="0.2"/>

  <circle cx="256" cy="330" r="3" fill="#ffffff" opacity="0.3"/>
  <circle cx="256" cy="310" r="2.5" fill="#ffffff" opacity="0.25"/>
  <circle cx="256" cy="292" r="2" fill="#ffffff" opacity="0.2"/>

  <!-- Brain 1 (top-left) - Red/coral -->
  <g transform="translate(110, 110)">
    <ellipse cx="50" cy="40" rx="45" ry="38" fill="url(#brain1)" opacity="0.9"/>
    <path d="M30,25 Q50,15 70,25" stroke="#ffffff" stroke-width="2.5" fill="none" opacity="0.5"/>
    <path d="M25,40 Q50,30 75,40" stroke="#ffffff" stroke-width="2.5" fill="none" opacity="0.4"/>
    <path d="M30,55 Q50,45 70,55" stroke="#ffffff" stroke-width="2.5" fill="none" opacity="0.3"/>
    <!-- Thinking bubbles -->
    <circle cx="15" cy="5" r="4" fill="#ff6b6b" opacity="0.7"/>
    <circle cx="5" cy="-8" r="3" fill="#ff6b6b" opacity="0.5"/>
    <circle cx="-2" cy="-18" r="2" fill="#ff6b6b" opacity="0.3"/>
  </g>

  <!-- Brain 2 (top-right) - Blue -->
  <g transform="translate(302, 110)">
    <ellipse cx="50" cy="40" rx="45" ry="38" fill="url(#brain2)" opacity="0.9"/>
    <path d="M30,25 Q50,15 70,25" stroke="#ffffff" stroke-width="2.5" fill="none" opacity="0.5"/>
    <path d="M25,40 Q50,30 75,40" stroke="#ffffff" stroke-width="2.5" fill="none" opacity="0.4"/>
    <path d="M30,55 Q50,45 70,55" stroke="#ffffff" stroke-width="2.5" fill="none" opacity="0.3"/>
    <circle cx="85" cy="5" r="4" fill="#4ea8de" opacity="0.7"/>
    <circle cx="95" cy="-8" r="3" fill="#4ea8de" opacity="0.5"/>
    <circle cx="102" cy="-18" r="2" fill="#4ea8de" opacity="0.3"/>
  </g>

  <!-- Brain 3 (bottom-center) - Purple -->
  <g transform="translate(206, 300)">
    <ellipse cx="50" cy="40" rx="45" ry="38" fill="url(#brain3)" opacity="0.9"/>
    <path d="M30,25 Q50,15 70,25" stroke="#ffffff" stroke-width="2.5" fill="none" opacity="0.5"/>
    <path d="M25,40 Q50,30 75,40" stroke="#ffffff" stroke-width="2.5" fill="none" opacity="0.4"/>
    <path d="M30,55 Q50,45 70,55" stroke="#ffffff" stroke-width="2.5" fill="none" opacity="0.3"/>
    <circle cx="50" cy="85" r="4" fill="#a855f7" opacity="0.7"/>
    <circle cx="50" cy="98" r="3" fill="#a855f7" opacity="0.5"/>
    <circle cx="50" cy="108" r="2" fill="#a855f7" opacity="0.3"/>
  </g>

  <!-- Central spark -->
  <g transform="translate(256, 270)">
    <circle cx="0" cy="0" r="20" fill="#fbbf24" opacity="0.15"/>
    <circle cx="0" cy="0" r="12" fill="#fbbf24" opacity="0.25"/>
    <polygon points="0,-14 4,-5 14,-5 6,2 9,12 0,6 -9,12 -6,2 -14,-5 -4,-5" fill="url(#spark)"/>
    <circle cx="0" cy="0" r="4" fill="#ffffff" opacity="0.8"/>
  </g>

  <!-- Floating particles -->
  <circle cx="130" cy="270" r="2" fill="#e94560" opacity="0.4"/>
  <circle cx="380" cy="270" r="2" fill="#4ea8de" opacity="0.4"/>
  <circle cx="190" cy="420" r="2" fill="#a855f7" opacity="0.4"/>
  <circle cx="320" cy="420" r="2" fill="#fbbf24" opacity="0.4"/>
  <circle cx="100" cy="350" r="1.5" fill="#ff6b6b" opacity="0.3"/>
  <circle cx="410" cy="350" r="1.5" fill="#4ea8de" opacity="0.3"/>
</svg>
